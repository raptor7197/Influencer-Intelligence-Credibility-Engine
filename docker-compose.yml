services:
  backend:
    build: apps/api
    ports:
      - "8000:8000"
    env_file: apps/api/.env
    environment:
      - DATABASE_URL=sqlite:///./data/iice.db
    volumes:
      - api-data:/app/data

  frontend:
    build: apps/frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  api-data:
